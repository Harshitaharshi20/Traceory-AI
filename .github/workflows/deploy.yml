name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Explicitly grant all necessary permissions for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Install Dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Build Web
        working-directory: ./frontend
        # Ensure base-href matches repo name
        run: flutter build web --release --base-href "/Traceory-AI/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build/web
